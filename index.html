<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1014">
<title>Price</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1014;
  --accent:#5ec8c8;
  --muted:#7d93a0;
  --red:#e0697a;
  --text:#dde6e9;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg);}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;
  min-height:100svh;
  font-family:'Space Mono',monospace;
  background:var(--bg);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) max(env(safe-area-inset-bottom), 20px) env(safe-area-inset-left);
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(94,200,200,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.price{
  font-size:clamp(100px,38vw,270px);
  font-weight:700;
  color:var(--text);
  letter-spacing:-2px;
  line-height:1;
  position:relative;z-index:1;
  text-align:center;
  padding:0 12px;
  width:100%;
}
.meta{
  margin-bottom:8px;
  font-size:15px;
  color:var(--muted);
  text-align:center;
  position:relative;z-index:1;
  letter-spacing:0.06em;
}
.dot{
  display:inline-block;width:6px;height:6px;
  background:var(--accent);border-radius:50%;
  margin-right:7px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(94,200,200,0.4);}
  50%{opacity:0.4;box-shadow:0 0 0 5px rgba(94,200,200,0);}
}
.error{
  color:var(--red);font-size:12px;margin-top:14px;
  display:none;position:relative;z-index:1;
}
.error.show{display:block;}

/* ── Progress bar ── */
.progress-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:3px;
  background:rgba(255,255,255,0.07);
  z-index:10;
}
.progress-fill{
  height:100%;
  width:100%;
  background:rgba(94,200,200,0.35);
  transform-origin:left;
  transition:transform 0.2s linear;
}
</style>
</head>
<body>

<div class="price" id="price">—</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="error" id="err"></div>

<script>
var MARKET  = 'SIRENINR';
var REFRESH = 10000;
var API_URL = 'https://api.coindcx.com/exchange/ticker';
var PROXIES = [
  function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); }
];

var HAS_FETCH   = typeof window.fetch === 'function';
var HAS_PROMISE = typeof window.Promise === 'function';

/* ── Time formatting without locale options ── */
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtTime(d) {
  var h  = ('0' + d.getHours()).slice(-2);
  var m  = ('0' + d.getMinutes()).slice(-2);
  var s  = ('0' + d.getSeconds()).slice(-2);
  return h + ':' + m + ':' + s;
}

/* ── Price formatting without en-IN locale ── */
function fmt(p) {
  if (!p && p !== 0) return '—';
  if (p >= 1)    return '' + parseFloat(p.toFixed(6));
  if (p >= 0.01) return '' + p.toFixed(4);
  return '' + p.toFixed(6);
}

/* ── XHR fetcher (works on Android 4+) ── */
function xhrGet(url, ms, onDone, onFail) {
  var xhr = new XMLHttpRequest();
  var done = false;
  var timer = setTimeout(function() {
    done = true; xhr.abort(); onFail(new Error('timeout'));
  }, ms);
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    clearTimeout(timer);
    if (done) return;
    done = true;
    if (xhr.status >= 200 && xhr.status < 300) {
      try { onDone(JSON.parse(xhr.responseText)); }
      catch(e) { onFail(new Error('JSON error')); }
    } else { onFail(new Error('HTTP ' + xhr.status)); }
  };
  xhr.onerror = function() { clearTimeout(timer); if (!done) { done=true; onFail(new Error('Network error')); } };
  xhr.send();
}

/* ── Promise wrapper around XHR ── */
function getJSON(url, ms) {
  return new Promise(function(resolve, reject) {
    if (HAS_FETCH) {
      var done = false;
      var timer = setTimeout(function() {
        if (!done) { done=true; reject(new Error('timeout')); }
      }, ms);
      fetch(url).then(function(r) {
        clearTimeout(timer);
        if (done) return; done = true;
        if (!r.ok) { reject(new Error('HTTP ' + r.status)); return; }
        r.json().then(resolve).catch(reject);
      }).catch(function(e) { clearTimeout(timer); if (!done) { done=true; reject(e); } });
    } else {
      xhrGet(url, ms, resolve, reject);
    }
  });
}

/* ── Try direct then proxies ── */
function fetchWithProxy(url) {
  return getJSON(url, 5000).catch(function() {
    return getJSON(PROXIES[0](url), 8000).catch(function() {
      return getJSON(PROXIES[1](url), 8000);
    });
  });
}

/* ── Find polyfill ── */
function findInArray(arr, fn) {
  for (var i = 0; i < arr.length; i++) { if (fn(arr[i])) return arr[i]; }
  return null;
}

/* ── Render ── */
function render(data) {
  var match = findInArray(data, function(d) { return d.market === MARKET; });
  if (!match) throw new Error('Market not found');
  var priceEl = document.getElementById('price');
  var errEl   = document.getElementById('err');
  priceEl.textContent = fmt(parseFloat(match.last_price));
  errEl.style.display = 'none';
  errEl.className = 'error';
}

function showError(msg) {
  var errEl = document.getElementById('err');
  errEl.textContent = '⚠ ' + msg;
  errEl.style.display = 'block';
  errEl.className = 'error show';
}

/* ── Main fetch — Promise path ── */
function fetchPrice() {
  if (HAS_PROMISE) {
    fetchWithProxy(API_URL).then(render).catch(function(e) { showError(e.message || 'Fetch failed'); });
  } else {
    /* No Promise at all — pure XHR callback chain */
    function tryUrl(idx) {
      var urls = [API_URL, PROXIES[0](API_URL), PROXIES[1](API_URL)];
      if (idx >= urls.length) { showError('All attempts failed'); return; }
      xhrGet(urls[idx], idx === 0 ? 5000 : 8000, function(data) {
        try { render(data); } catch(e) { showError(e.message); }
      }, function() { tryUrl(idx + 1); });
    }
    tryUrl(0);
  }
}


/* ── Progress bar countdown ── */
var progTimer = null;
var progStart = null;

function updateProgress() {
  var fill = document.getElementById('progress-fill');
  if (!fill) return;
  var elapsed = Date.now() - progStart;
  var ratio = Math.max(0, 1 - elapsed / REFRESH);
  fill.style.transform = 'scaleX(' + ratio + ')';
}

function startProgress() {
  if (progTimer) clearInterval(progTimer);
  progStart = Date.now();
  updateProgress();
  progTimer = setInterval(updateProgress, 200);
}

/* ── Seconds-since-update ticker — removed (no meta label) ── */

var _origRender = render;
render = function(data) {
  _origRender(data);
  startProgress();
};

fetchPrice();
setInterval(fetchPrice, REFRESH);
</script>
</body>
</html>
