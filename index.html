<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1014">
<title>Price</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1014;
  --accent:#5ec8c8;
  --muted:#7d93a0;
  --red:#e0697a;
  --text:#dde6e9;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg);}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;
  min-height:100svh;
  font-family:'Space Mono',monospace;
  background:var(--bg);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(94,200,200,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.center-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;z-index:1;
  width:100%;
}
.price{
  font-size:100px;font-size:clamp(60px,22vw,160px);
  font-weight:700;
  color:var(--text);
  letter-spacing:-2px;
  line-height:1;
  position:relative;z-index:1;
  text-align:center;
  padding:0 12px;
  width:100%;
}
.meta{
  margin-top:16px;
  font-size:15px;
  color:var(--muted);
  text-align:center;
  position:relative;z-index:1;
  letter-spacing:0.06em;
}
.dot{
  display:inline-block;width:6px;height:6px;
  background:var(--accent);border-radius:50%;
  margin-right:7px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(94,200,200,0.4);}
  50%{opacity:0.4;box-shadow:0 0 0 5px rgba(94,200,200,0);}
}
.error{
  color:var(--red);font-size:12px;margin-top:14px;
  display:none;position:relative;z-index:1;
}
.error.show{display:block;}

/* ── Circular countdown clock ── */
.clock-wrap{
  position:relative;
  width:64px;height:64px;
  margin-top:20px;
  z-index:1;
}
.clock-wrap svg{
  position:absolute;top:0;left:0;
  -webkit-transform:rotate(-90deg);
  transform:rotate(-90deg);
}
.clock-track{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:3;}
.clock-fill{
  fill:none;stroke:#5ec8c8;stroke-width:3;
  stroke-linecap:round;
  stroke-dasharray:175.93;
  stroke-dashoffset:0;
  -webkit-transition:stroke-dashoffset 0.2s linear, stroke 0.4s;
  transition:stroke-dashoffset 0.2s linear, stroke 0.4s;
}
.clock-num{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  font-family:'Space Mono',monospace;
  font-size:16px;font-weight:700;
  color:#5ec8c8;
}
</style>
</head>
<body>

<div class="center-col">
  <div class="clock-wrap">
    <svg width="64" height="64" viewBox="0 0 64 64">
      <circle class="clock-track" cx="32" cy="32" r="28"/>
      <circle class="clock-fill" id="clock-fill" cx="32" cy="32" r="28"/>
    </svg>
    <div class="clock-num" id="clock-num">10</div>
  </div>
  <div class="price" id="price">—</div>
  <div class="meta" id="meta"><span class="dot"></span>loading…</div>
  <div class="error" id="err"></div>
</div>

<script>
var MARKET  = 'SIRENINR';
var REFRESH = 10000;
var API_URL = 'https://api.coindcx.com/exchange/ticker';
var PROXIES = [
  function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); }
];

var HAS_FETCH   = typeof window.fetch === 'function';
var HAS_PROMISE = typeof window.Promise === 'function';

/* ── Time formatting ── */
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtTime(d) {
  var h  = ('0' + d.getHours()).slice(-2);
  var m  = ('0' + d.getMinutes()).slice(-2);
  var s  = ('0' + d.getSeconds()).slice(-2);
  return h + ':' + m + ':' + s;
}

/* ── Price formatting ── */
function fmt(p) {
  if (!p && p !== 0) return '—';
  if (p >= 1)    return parseFloat(p.toFixed(6));
  if (p >= 0.01) return p.toFixed(4);
  return p.toFixed(6);
}

/* ── XHR fetcher ── */
function xhrGet(url, ms, onDone, onFail) {
  var xhr = new XMLHttpRequest();
  var done = false;
  var timer = setTimeout(function() {
    done = true; xhr.abort(); onFail(new Error('timeout'));
  }, ms);
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    clearTimeout(timer);
    if (done) return;
    done = true;
    if (xhr.status >= 200 && xhr.status < 300) {
      try { onDone(JSON.parse(xhr.responseText)); }
      catch(e) { onFail(new Error('JSON error')); }
    } else { onFail(new Error('HTTP ' + xhr.status)); }
  };
  xhr.onerror = function() { clearTimeout(timer); if (!done) { done=true; onFail(new Error('Network error')); } };
  xhr.send();
}

/* ── Promise wrapper ── */
function getJSON(url, ms) {
  return new Promise(function(resolve, reject) {
    if (HAS_FETCH) {
      var done = false;
      var timer = setTimeout(function() {
        if (!done) { done=true; reject(new Error('timeout')); }
      }, ms);
      fetch(url).then(function(r) {
        clearTimeout(timer);
        if (done) return; done = true;
        if (!r.ok) { reject(new Error('HTTP ' + r.status)); return; }
        r.json().then(resolve).catch(reject);
      }).catch(function(e) { clearTimeout(timer); if (!done) { done=true; reject(e); } });
    } else {
      xhrGet(url, ms, resolve, reject);
    }
  });
}

function fetchWithProxy(url) {
  return getJSON(url, 5000).catch(function() {
    return getJSON(PROXIES[0](url), 8000).catch(function() {
      return getJSON(PROXIES[1](url), 8000);
    });
  });
}

function findInArray(arr, fn) {
  for (var i = 0; i < arr.length; i++) { if (fn(arr[i])) return arr[i]; }
  return null;
}

/* ── Render ── */
function render(data) {
  var match = findInArray(data, function(d) { return d.market === MARKET; });
  if (!match) throw new Error('Market not found');
  var priceEl = document.getElementById('price');
  var metaEl  = document.getElementById('meta');
  var errEl   = document.getElementById('err');
  priceEl.textContent = fmt(parseFloat(match.last_price));
  metaEl.innerHTML = '<span class="dot"></span>' + fmtTime(new Date());
  errEl.style.display = 'none';
  errEl.className = 'error';
}

function showError(msg) {
  var errEl  = document.getElementById('err');
  var metaEl = document.getElementById('meta');
  errEl.textContent = '⚠ ' + msg;
  errEl.style.display = 'block';
  errEl.className = 'error show';
  metaEl.innerHTML = '<span class="dot"></span>offline';
}

function fetchPrice() {
  if (HAS_PROMISE) {
    fetchWithProxy(API_URL).then(render).catch(function(e) { showError(e.message || 'Fetch failed'); });
  } else {
    function tryUrl(idx) {
      var urls = [API_URL, PROXIES[0](API_URL), PROXIES[1](API_URL)];
      if (idx >= urls.length) { showError('All attempts failed'); return; }
      xhrGet(urls[idx], idx === 0 ? 5000 : 8000, function(data) {
        try { render(data); } catch(e) { showError(e.message); }
      }, function() { tryUrl(idx + 1); });
    }
    tryUrl(0);
  }
}

/* ── Circular countdown clock ── */
var CIRC = 2 * Math.PI * 28;
var clockTimer = null;
var clockSec = 0;

function updateClock(sec) {
  var fill = document.getElementById('clock-fill');
  var num  = document.getElementById('clock-num');
  if (!fill || !num) return;
  var ratio = sec / (REFRESH / 1000);
  fill.style.strokeDashoffset = CIRC * (1 - ratio);
  fill.style.stroke = ratio > 0.5 ? '#5ec8c8' : ratio > 0.25 ? '#d4a843' : '#e0697a';
  num.style.color   = ratio > 0.5 ? '#5ec8c8' : ratio > 0.25 ? '#d4a843' : '#e0697a';
  num.textContent   = sec;
}

function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockSec = Math.round(REFRESH / 1000);
  updateClock(clockSec);
  clockTimer = setInterval(function() {
    clockSec--;
    if (clockSec < 0) clockSec = 0;
    updateClock(clockSec);
  }, 1000);
}

/* ── Seconds-since-update ticker ── */
var lastUpdate = null;
var tickTimer  = null;

function startTick() {
  if (tickTimer) clearInterval(tickTimer);
  lastUpdate = Date.now();
  tickTimer = setInterval(function() {
    var sec = Math.round((Date.now() - lastUpdate) / 1000);
    var metaEl = document.getElementById('meta');
    var timeStr = metaEl ? (metaEl.getAttribute('data-time') || '') : '';
    if (metaEl) metaEl.innerHTML = '<span class="dot"></span>' + timeStr + ' &nbsp;·&nbsp; ' + sec + 's ago';
  }, 1000);
}

var _origRender = render;
render = function(data) {
  _origRender(data);
  var metaEl = document.getElementById('meta');
  if (metaEl) metaEl.setAttribute('data-time', fmtTime(new Date()));
  startTick();
  startClock();
};

fetchPrice();
setInterval(fetchPrice, REFRESH);
</script>
</body>
</html>
