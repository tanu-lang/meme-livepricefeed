<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1014">
<title>Price</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1014;
  --accent:#5ec8c8;
  --muted:#7d93a0;
  --red:#e0697a;
  --text:#dde6e9;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg);}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;
  min-height:100svh;
  font-family:'Space Mono',monospace;
  background:var(--bg);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(94,200,200,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.price{
  font-size:clamp(60px,22vw,160px);
  font-weight:700;
  color:var(--text);
  letter-spacing:-2px;
  line-height:1;
  position:relative;z-index:1;
  text-align:center;
  padding:0 12px;
  width:100%;
}
.meta{
  margin-top:24px;
  font-size:15px;
  color:var(--muted);
  text-align:center;
  position:relative;z-index:1;
  letter-spacing:0.06em;
}
.dot{
  display:inline-block;width:6px;height:6px;
  background:var(--accent);border-radius:50%;
  margin-right:7px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(94,200,200,0.4);}
  50%{opacity:0.4;box-shadow:0 0 0 5px rgba(94,200,200,0);}
}
.error{
  color:var(--red);font-size:12px;margin-top:14px;
  display:none;position:relative;z-index:1;
}
.error.show{display:block;}
</style>
</head>
<body>

<div class="price" id="price">—</div>
<div class="meta" id="meta"><span class="dot"></span>loading…</div>
<div class="error" id="err"></div>

<script>
const MARKET = 'SIRENINR';
const REFRESH = 60000;
const URL = 'https://api.coindcx.com/exchange/ticker';
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

async function fetchWithProxy(url) {
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(5000)});
    if (r.ok) return r.json();
  } catch(_){}
  for (const mk of PROXIES) {
    try {
      const r = await fetch(mk(url), {signal: AbortSignal.timeout(8000)});
      if (r.ok) return r.json();
    } catch(_){}
  }
  throw new Error('Fetch failed');
}

function fmt(p) {
  if (!p && p !== 0) return '—';
  if (p >= 1000) return '₹' + p.toLocaleString('en-IN', {maximumFractionDigits:2});
  if (p >= 1)    return '₹' + p.toFixed(2);
  if (p >= 0.01) return '₹' + p.toFixed(4);
  return '₹' + p.toFixed(6);
}

async function fetch_price() {
  const priceEl = document.getElementById('price');
  const metaEl  = document.getElementById('meta');
  const errEl   = document.getElementById('err');
  try {
    const data  = await fetchWithProxy(URL);
    const match = data.find(d => d.market === MARKET);
    if (!match) throw new Error('Market not found');
    priceEl.textContent = fmt(parseFloat(match.last_price));
    const now = new Date();
    metaEl.innerHTML = '<span class="dot"></span>' +
      now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    errEl.classList.remove('show');
  } catch(e) {
    errEl.textContent = '⚠ ' + e.message;
    errEl.classList.add('show');
    metaEl.innerHTML = '<span class="dot"></span>offline';
  }
}

fetch_price();
setInterval(fetch_price, REFRESH);
</script>
</body>
</html>
